display_information:
  name: Ventorix Signal Bot
  description: "Metadata-only workspace health signals for Ventorix (counts, never message bodies)."
  background_color: "#111111"

features:
  bot_user:
    display_name: Ventorix Signals
    always_online: true

oauth_config:
  redirect_urls:
    - https://app.ventorix.club/api/integrations/slack/oauth/callback
    - https://app.ventorix.club/api/startups/integrations/oauth/slack/callback
  scopes:
    bot:
      - channels:read
      - users:read
      - channels:history
      - team:read

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false

# Required environment variables on the Ventorix server:
#   SLACK_OAUTH_CLIENT_ID
#   SLACK_OAUTH_CLIENT_SECRET
#   SESSION_SECRET             (>= 16 chars, used to sign OAuth state)
#   INTEGRATION_ENCRYPTION_KEY (used to encrypt the bot token at rest)
#
# Privacy:
#   The bot only reads channel + user listings and counts of messages since the
#   previously-stored timestamp. It NEVER stores message bodies. Only the
#   following fields are persisted per workspace:
#     - team id, team name
#     - bot token (AES-encrypted)
#     - snapshot of channel ids + per-channel last_ts
